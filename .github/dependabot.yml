version: 2
updates:
  - package-ecosystem: uv
    labels:
      - dependencies
    directories:
      - backend/
      - client/python/
      - bot/discord/
      - bot/telegram/
      - bot/reddit/
    schedule:
      interval: weekly
    cooldown:
      # Supply chain attack defense - don't use packages published within 1 day
      default-days: 1
    groups:
      bot-common:
        # Group dependencies shared across bots into a single PR
        patterns:
          - "aiohttp*"
          - "aiohappyeyeballs"
          - "aiosignal"
          - "annotated-types"
          - "attrs"
          - "frozenlist"
          - "idna"
          - "multidict"
          - "propcache"
          - "pydantic"
          - "pydantic-core"
          - "python-dateutil"
          - "six"
          - "typing-extensions"
          - "typing-inspection"
          - "urllib3"
          - "yarl"
  # Root requirements.txt holds dev/test tooling, including uv itself.
  - package-ecosystem: pip
    labels:
      - dependencies
    directory: /
    schedule:
      interval: weekly
    cooldown:
      # Supply chain attack defense - don't use packages published within 1 day
      default-days: 1
  - package-ecosystem: docker
    labels:
      - dependencies
    directories:
      - backend/
      - bot/discord/
      - bot/telegram/
      - bot/reddit/
    schedule:
      interval: weekly
    cooldown:
      # Supply chain attack defense - don't use packages published within 1 day
      default-days: 1
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-patch
  - package-ecosystem: docker-compose
    labels:
      - dependencies
    directories:
      - /
    schedule:
      interval: weekly
    cooldown:
      # Supply chain attack defense - don't use packages published within 1 day
      default-days: 1
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-patch
  - package-ecosystem: github-actions
    labels:
      - CI/CD
      - dependencies
    directory: /
    schedule:
      interval: weekly
    cooldown:
      # Supply chain attack defense - don't use packages published within 1 day
      default-days: 1
  - package-ecosystem: npm
    labels:
      - dependencies
    directory: /client/typescript/
    schedule:
      interval: weekly
    cooldown:
      # Supply chain attack defense - don't use packages published within 1 day
      default-days: 1
      
