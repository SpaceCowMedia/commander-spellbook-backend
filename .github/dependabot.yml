version: 2
updates:
  - package-ecosystem: pip
    labels:
      - dependencies
    directories:
      - backend/
      - client/python/
      - bot/discord/
      - bot/telegram/
      - bot/reddit/
    schedule:
      interval: weekly
    cooldown:
      # Supply chain attack defense - don't use packages published within 1 day
      default-days: 1
  - package-ecosystem: docker
    labels:
      - dependencies
    directories:
      - backend/
      - bot/discord/
      - bot/telegram/
      - bot/reddit/
    schedule:
      interval: weekly
    cooldown:
      # Supply chain attack defense - don't use packages published within 1 day
      default-days: 1
  - package-ecosystem: docker-compose
    labels:
      - dependencies
    directories:
      - /
    schedule:
      interval: weekly
    cooldown:
      # Supply chain attack defense - don't use packages published within 1 day
      default-days: 1
  - package-ecosystem: github-actions
    labels:
      - CI/CD
      - dependencies
    directory: /
    schedule:
      interval: weekly
    cooldown:
      # Supply chain attack defense - don't use packages published within 1 day
      default-days: 1
  - package-ecosystem: npm
    labels:
      - dependencies
    directory: /client/typescript/
    schedule:
      interval: weekly
    cooldown:
      # Supply chain attack defense - don't use packages published within 1 day
      default-days: 1
      
